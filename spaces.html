  <!-- 導覽列 -->
  <nav class="navbar navbar-expand-lg navbar-dark fixed-top shadow-sm"
       style="background-color:#007B40" role="navigation" aria-label="主選單">
    <div class="container-fluid px-3">
      <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="index.html">
        <i class="fa-solid fa-building" aria-hidden="true"></i>
        <span>中華郵政 牆面廣告版位</span>
      </a>
      <button class="navbar-toggler border-0" type="button"
        data-bs-toggle="collapse" data-bs-target="#navMenu"
        aria-controls="navMenu" aria-expanded="false" aria-label="展開選單">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto gap-lg-1">
          <li class="nav-item"><a class="nav-link" href="index.html">首頁</a></li>
          <li class="nav-item"><a class="nav-link" href="locations.html">局所列表</a></li>
          <li class="nav-item"><a class="nav-link" href="#contact">聯絡我們</a></li>
          <li class="nav-item">
            <a class="nav-link d-none fw-semibold" href="quotation.html" id="navCartLink">
              選擇版位報價
              <span class="badge rounded-pill ms-1" id="navCartBadge"
                    style="background:#dc3545;color:#ffd700">0</span>
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- 主內容 -->
  <div class="container" style="padding-top:70px" id="spacesPage">

    <!-- 載入中 -->
    <div id="spacesLoading" class="text-center py-5">
      <div class="spinner-border text-success" role="status">
        <span class="visually-hidden">載入中</span>
      </div>
      <p class="mt-3 text-muted small">正在讀取版位資料…</p>
    </div>

    <!-- 錯誤 -->
    <div id="spacesError" class="alert alert-danger mx-2 mt-3 d-none"></div>

    <!-- 郵局資訊（動態插入） -->
    <div id="locationHeader" class="d-none"></div>

    <!-- 版位列表（動態插入） -->
    <div id="spacesList" class="d-none"></div>

  </div>

  <!-- 圖片放大 Modal -->
  <div class="modal fade" id="imgModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content bg-transparent border-0">
        <button type="button" class="btn-close btn-close-white ms-auto mb-2"
                data-bs-dismiss="modal" aria-label="關閉"></button>
        <img id="imgModalSrc" src="" alt="" class="img-fluid rounded shadow-lg">
      </div>
    </div>
  </div>

  <!-- 詢價浮動列 -->
  <div id="inquiryBar" class="d-none position-fixed bottom-0 start-0 end-0 text-white shadow-lg"
       style="background-color:#007B40;z-index:1050">
    <div class="container-fluid px-3 py-2 d-flex justify-content-between align-items-center">
      <span class="small">
        <i class="fa-solid fa-clipboard-list me-2"></i>
        詢價清單：<strong id="inquiryCount">0</strong> 個版位
      </span>
      <button class="btn btn-warning btn-sm fw-bold px-3" onclick="showInquiryModal()">
        查看詢價清單 <i class="fa-solid fa-arrow-right ms-1"></i>
      </button>
    </div>
  </div>

  <!-- 詢價 Modal -->
  <div class="modal fade" id="inquiryModal" tabindex="-1"
       aria-labelledby="inquiryModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header" style="background-color:#007B40;color:white">
          <h5 class="modal-title" id="inquiryModalLabel">
            <i class="fa-solid fa-clipboard-list me-2"></i>詢價清單
          </h5>
          <button type="button" class="btn-close btn-close-white"
                  data-bs-dismiss="modal" aria-label="關閉"></button>
        </div>
        <div class="modal-body p-0" id="inquiryModalBody"></div>
        <div class="modal-footer d-flex justify-content-between align-items-center flex-wrap gap-2">
          <div class="text-muted small">填寫資料後我們將盡速與您聯繫</div>
          <button class="btn btn-danger fw-bold px-4" onclick="goToQuotation()">
            <i class="fa-solid fa-file-invoice-dollar me-2"></i>索取報價單
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- 頁尾 -->
  <footer class="bg-dark text-white py-5 mt-5" role="contentinfo" id="contact">
    <div class="container">
      <div class="row g-4 align-items-start">
        <div class="col-md-4">
          <h5 class="fw-bold mb-3" style="color:#4ade80">中華郵政 牆面廣告版位</h5>
          <p class="text-white-50 small mb-0">
            服務區域：基隆市全區・新北市汐止區・新北市瑞芳區<br>
            本網站資料由 Google Sheets 即時提供，版位狀態以實際確認為準。
          </p>
        </div>
        <div class="col-md-4">
          <h6 class="fw-bold mb-3 text-white">聯絡我們</h6>
          <ul class="list-unstyled text-white-50 small mb-0">
            <li class="mb-2">
              <i class="fa-solid fa-building me-2"></i>
              <a href="https://www.breathtiger.com" target="_blank" rel="noopener"
                 class="text-white-50 text-decoration-none">虎之呼吸科技有限公司</a>
            </li>
            <li class="mb-2">
              <i class="fa-solid fa-envelope me-2"></i>
              <a href="mailto:service@breathtiger.com"
                 class="text-white-50 text-decoration-none">service@breathtiger.com</a>
            </li>
            <li><i class="fa-solid fa-comment-dots me-2"></i>LINE 加入好友諮詢</li>
          </ul>
        </div>
        <div class="col-md-4 d-flex flex-column align-items-md-end align-items-start">
          <a href="https://lin.ee/Rtr3Tlq4" target="_blank" rel="noopener">
            <img src="https://scdn.line-apps.com/n/line_add_friends/btn/zh-Hant.png"
                 alt="加入好友" height="36" border="0">
          </a>
        </div>
      </div>

      <p class="text-white-50 text-center mb-0" style="font-size:12px">
        &copy; <span id="footerYear"></span> 虎之呼吸科技有限公司｜版權所有，翻印必究
      </p>
    </div>
